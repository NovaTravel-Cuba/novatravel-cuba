kind = "web"
previewPath = "/"
title = "NovaTravel"
version = "1.0.0"
id = "artifacts/novatravel"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18814

[services.development]
run = "pnpm --filter @workspace/novatravel run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/novatravel", "run", "build" ]
publicDir = "artifacts/novatravel/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18814"
BASE_PATH = "/"
